name: Test Phase I Short - CDC Pandas ETL 

on:
  push:
    branches: [ master, stable ]
    paths:
      - "phase1-pandas-dag/**"
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cache pip dependencies for speed
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install apache-airflow==2.7.0 apache-airflow-providers-slack==7.3.2 \
            --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.7.0/constraints-3.11.txt"
          pip install great-expectations==1.5.11 pytest==7.4.0

      - name: Run All Tests (Fail Fast)
        run: |
          pytest phase1-pandas-dag/tests -v --maxfail=1 --disable-warnings