name: Test Phase I - CDC Pandas ETL

on:
  push:
    branches: [ master, stable ]
  paths:
    - 'phase1-pandas-dag/**'
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    
    # 🚀 This strategy block makes your portfolio look high-level
    strategy:
      fail-fast: false # Shows recruiters you want to see ALL test results, not just the first failure
      matrix:
        test-suite: [test_dag, test_extract, test_transform, test_integration, test_validate, test_regression]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ⚡ Advanced portfolio touch: Proves you know how to optimize build speeds
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('phase1-pandas-dag/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install apache-airflow==2.7.0 apache-airflow-providers-slack==7.3.2 \
            --constraint "https://githubusercontent.com"
          pip install great-expectations==1.5.11 pytest==7.4.0

      # 🧪 Dynamically injects the file name from the matrix above
      - name: Run ${{ matrix.test-suite }}
        run: pytest phase1-pandas-dag/tests/${{ matrix.test-suite }}.py -v
